<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>mosu! Preview Settings</title>
  <style>
    html,
    body {
      margin: 0;
      min-height: 100%;
      background: rgb(24, 23, 28);
      color: rgb(255, 255, 255);
      font-family: sans-serif;
    }

    body {
      min-height: 100vh;
    }

    .settings-page {
      width: 100%;
      max-width: 780px;
      margin: 0 auto;
      padding: 24px 16px;
    }
  </style>
  <link rel="stylesheet" href="options.css" />
</head>

<body>
  <main class="settings-page">
    <section class="settings-card">
      <p id="saveStatus" class="settings-status" aria-live="polite"></p>
      <div class="settings-header">
        <p class="settings-eyebrow">Extension settings</p>
        <h1>mosu! Preview</h1>
      </div>
      <div class="settings-group">
        <h2 class="settings-section-title">standard preview</h2>
        <label for="standardSnakingSliders" class="settings-toggle-card">
          <input id="standardSnakingSliders" type="checkbox" />
          <span class="settings-toggle-mark" aria-hidden="true"></span>
          <span class="settings-toggle-copy">
            <span class="settings-toggle-title">Enable snaking sliders</span>
            <span class="settings-toggle-description">Animate slider bodies in during fade-in.</span>
          </span>
        </label>
        <label for="standardSliderEndCircles" class="settings-toggle-card">
          <input id="standardSliderEndCircles" type="checkbox" checked />
          <span class="settings-toggle-mark" aria-hidden="true"></span>
          <span class="settings-toggle-copy">
            <span class="settings-toggle-title">Show slider end circles</span>
            <span class="settings-toggle-description">Keep a separate tail circle visible at the slider endpoint.</span>
          </span>
        </label>
      </div>

      <div class="settings-group">
        <h2 class="settings-section-title">mania preview</h2>
        <label for="maniaScrollSpeedRange" class="settings-label">
          Scroll speed
        </label>
        <div class="settings-speed-row">
          <input id="maniaScrollSpeedRange" class="settings-range" type="range" min="1" max="40" step="1" value="28" />
          <input id="maniaScrollSpeedInput" class="settings-number" type="number" min="1" max="40" step="1"
            value="28" />
        </div>
        <label for="maniaScrollScaleWithBpm" class="settings-toggle-card">
          <input id="maniaScrollScaleWithBpm" type="checkbox" />
          <span class="settings-toggle-mark" aria-hidden="true"></span>
          <span class="settings-toggle-copy">
            <span class="settings-toggle-title">Scale scroll speed with BPM</span>
            <span class="settings-toggle-description">Adjust the scroll speed based on the BPM of the song.</span>
          </span>
        </label>
      </div>

      <div class="settings-group">
        <h2 class="settings-section-title">audio</h2>
        <label for="providerOverride" class="settings-label">Provider override</label>
        <div class="settings-select-wrap">
          <select id="providerOverride" class="settings-select">
            <option value="auto">Auto (recommended)</option>
            <option value="osu_direct">osu.direct</option>
            <option value="nerinyan">NeriNyan</option>
            <option value="sayobot">Sayobot</option>
            <option value="mino">Mino (catboy.best)</option>
          </select>
        </div>
        <p class="settings-help">
          Auto prioritizes the most reliable provider and temporarily cools down failures.
        </p>
      </div>
    </section>
  </main>
  <script type="module" src="src/options.js"></script>
</body>

</html>
