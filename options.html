<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mosu! Preview Settings</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main class="settings-page">
      <section class="settings-card">
        <h1>mosu! Preview Settings</h1>
        <p class="settings-subtitle">Audio provider selection for full track hot-swap.</p>
        <label for="providerOverride" class="settings-label">Provider override</label>
        <select id="providerOverride" class="settings-select">
          <option value="auto">Auto (recommended)</option>
          <option value="osu_direct">osu.direct</option>
          <option value="catboy">catboy</option>
          <option value="osu">osu!</option>
          <option value="chimu">chimu</option>
        </select>
        <p class="settings-help">
          Auto uses reliability ordering with temporary cooldown after provider failures.
        </p>
        <p id="saveStatus" class="settings-status" aria-live="polite"></p>
      </section>
    </main>
    <script type="module" src="src/options.js"></script>
  </body>
</html>
